name: proofforge-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: proofforge-postgres-dev
    environment:
      POSTGRES_DB: proofforge
      POSTGRES_USER: proofforge
      POSTGRES_PASSWORD: proofforge
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proofforge -d proofforge"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - proofforge-postgres-data:/var/lib/postgresql/data
    networks:
      - proofforge-dev

  redis:
    image: redis:7-alpine
    container_name: proofforge-redis-dev
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - proofforge-dev

  minio:
    image: minio/minio:latest
    container_name: proofforge-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: proofforge
      MINIO_ROOT_PASSWORD: proofforge123
    ports:
      - "59000:9000"
      - "59001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - proofforge-minio-data:/data
    networks:
      - proofforge-dev

  minio-init:
    image: minio/mc:latest
    container_name: proofforge-minio-init-dev
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 proofforge proofforge123 &&
      mc mb --ignore-existing local/proofforge-dev &&
      mc anonymous set none local/proofforge-dev
      "
    networks:
      - proofforge-dev

  api:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
      args:
        TARGET: api
    container_name: proofforge-api-dev
    env_file: .env.dev
    environment:
      DATABASE_URL: postgres://proofforge:proofforge@postgres:5432/proofforge?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_USE_PATH_STYLE: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - proofforge-dev

  worker:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
      args:
        TARGET: worker
    container_name: proofforge-worker-dev
    env_file: .env.dev
    environment:
      DATABASE_URL: postgres://proofforge:proofforge@postgres:5432/proofforge?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_USE_PATH_STYLE: "true"
      DB_RUN_MIGRATIONS: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - proofforge-dev

  web:
    build:
      context: ../..
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    container_name: proofforge-web-dev
    env_file: .env.dev
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3003:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - proofforge-dev

volumes:
  proofforge-postgres-data:
  proofforge-minio-data:

networks:
  proofforge-dev:
    driver: bridge
