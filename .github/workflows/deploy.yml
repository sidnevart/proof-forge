name: Deploy ProofForge

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override. Defaults to the current commit SHA.
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: proofforge-prod-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: sidnevart

jobs:
  deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE_TAG: ${{ inputs.image_tag != '' && inputs.image_tag || github.sha }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH != '' && secrets.DEPLOY_PATH || '/opt/proofforge-prod' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          build-args: TARGET=api
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/proof-forge-api:${{ env.IMAGE_TAG }}

      - name: Build and push Worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          build-args: TARGET=worker
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/proof-forge-worker:${{ env.IMAGE_TAG }}

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/proof-forge-web:${{ env.IMAGE_TAG }}

      - name: Install SSH key
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/proofforge_deploy
          chmod 600 ~/.ssh/proofforge_deploy
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync deploy assets
        run: |
          ssh -i ~/.ssh/proofforge_deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH/nginx' '$DEPLOY_PATH/scripts'"
          scp -i ~/.ssh/proofforge_deploy -P "$DEPLOY_PORT" infra/docker/compose.prod.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/compose.prod.yml"
          scp -i ~/.ssh/proofforge_deploy -P "$DEPLOY_PORT" infra/nginx/nginx.prod.high-port.conf "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/nginx/nginx.conf"
          scp -i ~/.ssh/proofforge_deploy -P "$DEPLOY_PORT" infra/scripts/server/deploy_compose.sh "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/scripts/deploy_compose.sh"
          scp -i ~/.ssh/proofforge_deploy -P "$DEPLOY_PORT" infra/scripts/server/smoke_check.sh "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/scripts/smoke_check.sh"

      - name: Run remote deploy
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/proofforge_deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "chmod +x '$DEPLOY_PATH/scripts/deploy_compose.sh' '$DEPLOY_PATH/scripts/smoke_check.sh' && \
             IMAGE_TAG='$IMAGE_TAG' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' IMAGE_NAMESPACE='${IMAGE_NAMESPACE}' DEPLOY_PATH='$DEPLOY_PATH' '$DEPLOY_PATH/scripts/deploy_compose.sh'"
